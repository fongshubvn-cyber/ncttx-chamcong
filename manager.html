<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quản lý · NCTTX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Inter', sans-serif; }
  h1,h2,h3,.hd { font-family: 'Be Vietnam Pro', sans-serif; }
  body { background: #EDEAE3; }
  .view { display: none; min-height: 100dvh; flex-direction: column; }
  .view.show { display: flex; }
  .tab { border-bottom: 3px solid transparent; transition: all .2s; white-space: nowrap; }
  .tab.active { border-bottom-color: #1B4332; color: #1B4332; font-weight: 700; }
  .card { background: #fff; border-radius: 16px; box-shadow: 0 1px 8px rgba(27,67,50,.08); }
  .btn { border-radius: 12px; padding: 10px 16px; font-family: 'Be Vietnam Pro'; font-weight: 600; font-size: 14px; display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }
  .btn-g { background: #1B4332; color: #fff; }
  .btn-g:hover { background: #2D6A4F; }
  .btn-o { background: #fff; color: #1B4332; border: 2px solid #1B4332; }
  .btn-r { background: #fff; color: #E53E3E; border: 2px solid #E53E3E; }
  .input { border: 1.5px solid #d1d5db; border-radius: 10px; padding: 10px 14px; font-size: 14px; width: 100%; outline: none; background: #fff; }
  .input:focus { border-color: #1B4332; box-shadow: 0 0 0 3px rgba(27,67,50,.1); }
  .badge { display: inline-flex; align-items: center; gap: 3px; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .badge-wip  { background: #d1fae5; color: #065f46; }
  .badge-wait { background: #fef3c7; color: #92400e; }
  .badge-ok   { background: #dbeafe; color: #1e40af; }
  .badge-none { background: #f3f4f6; color: #6b7280; }
  .score-ring { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Be Vietnam Pro'; font-weight: 700; font-size: 14px; }
  .modal { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 50; display: flex; align-items: flex-end; }
  .modal.hidden { display: none; }
  .modal-box { background: #fff; border-radius: 20px 20px 0 0; width: 100%; max-height: 90vh; overflow-y: auto; padding: 20px; }
  .score-btn { width: 40px; height: 40px; border-radius: 10px; font-weight: 700; font-size: 15px; border: 2px solid #e5e7eb; cursor: pointer; transition: all .15s; }
  .score-btn.sel { background: #1B4332; color: #fff; border-color: #1B4332; }
  details summary { cursor: pointer; list-style: none; }
  details summary::-webkit-details-marker { display: none; }
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="v-login" class="view show items-center justify-center p-4" style="background:linear-gradient(160deg,#1B4332,#2D6A4F);">
  <div class="card w-full max-w-sm p-8">
    <div class="text-center mb-6">
      <div class="text-5xl mb-2">🏡</div>
      <h1 class="hd text-2xl font-bold" style="color:#1B4332;">Quản lý NCTTX</h1>
      <p class="text-gray-500 text-sm mt-1">Nhập mật khẩu để đăng nhập</p>
    </div>
    <input id="pin" type="password" class="input text-center text-lg mb-4" placeholder="Mật khẩu">
    <button class="btn btn-g w-full justify-center text-base py-3" onclick="doMgrLogin()">🔓 Đăng nhập</button>
    <p id="pin-err" class="text-red-500 text-center text-sm mt-3 hidden">⚠️ Mật khẩu không đúng</p>
    <div class="text-center mt-4">
      <a href="index.html" class="text-sm" style="color:#2D6A4F;">← App nhân viên</a>
    </div>
  </div>
</div>

<!-- ═══ MAIN ═══ -->
<div id="v-main" class="view">
  <!-- Header -->
  <div class="hd flex items-center justify-between px-4 py-3 sticky top-0 z-10" style="background:#1B4332;">
    <div class="flex items-center gap-2">
      <span class="text-2xl">🏡</span>
      <span class="text-white font-bold text-lg">NCTTX Manager</span>
    </div>
    <button onclick="doMgrLogout()" class="text-green-300 text-sm">Đăng xuất</button>
  </div>

  <!-- Tabs -->
  <div class="bg-white border-b flex overflow-x-auto px-1">
    <button id="tab-report"   class="tab active px-4 py-3 text-sm hd" onclick="switchTab('report')">📊 Báo cáo</button>
    <button id="tab-employees" class="tab px-4 py-3 text-sm hd text-gray-400" onclick="switchTab('employees')">👥 Nhân viên</button>
    <button id="tab-checklist" class="tab px-4 py-3 text-sm hd text-gray-400" onclick="switchTab('checklist')">✅ Checklist</button>
    <button id="tab-kpi"      class="tab px-4 py-3 text-sm hd text-gray-400" onclick="switchTab('kpi')">🏆 KPI</button>
  </div>

  <!-- ─── TAB: BÁO CÁO ─── -->
  <div id="panel-report" class="flex-1 p-4 overflow-y-auto">
    <div class="flex gap-2 mb-4">
      <input id="date-pick" type="date" class="input flex-1">
      <button class="btn btn-g" onclick="loadReport()">🔍 Xem</button>
    </div>
    <div class="flex gap-2 mb-4 overflow-x-auto pb-1">
      <button class="filter-btn badge badge-none cursor-pointer" data-s="all" onclick="applyFilter(this)">Tất cả</button>
      <button class="filter-btn badge cursor-pointer" style="background:#f3f4f6;color:#6b7280;" data-s="Đang làm việc" onclick="applyFilter(this)">🟢 Đang làm</button>
      <button class="filter-btn badge cursor-pointer" style="background:#f3f4f6;color:#6b7280;" data-s="Chờ duyệt" onclick="applyFilter(this)">🟡 Chờ duyệt</button>
      <button class="filter-btn badge cursor-pointer" style="background:#f3f4f6;color:#6b7280;" data-s="Đã duyệt" onclick="applyFilter(this)">🔵 Đã duyệt</button>
    </div>
    <div id="report-list" class="space-y-3">
      <p class="text-gray-400 text-center py-10 hd">Chọn ngày để xem dữ liệu 📅</p>
    </div>
  </div>

  <!-- ─── TAB: NHÂN VIÊN ─── -->
  <div id="panel-employees" class="hidden flex-1 p-4 overflow-y-auto">
    <button class="btn btn-g mb-4 w-full justify-center" onclick="openCreateEmp()">➕ Thêm nhân viên mới</button>
    <div id="emp-list" class="space-y-3">
      <p class="text-gray-400 text-center py-10 hd">Đang tải danh sách...</p>
    </div>
  </div>

  <!-- ─── TAB: CHECKLIST ─── -->
  <div id="panel-checklist" class="hidden flex-1 p-4 overflow-y-auto">
    <div class="mb-4">
      <label class="text-sm hd font-semibold text-gray-600 block mb-2">Chọn bộ phận chỉnh sửa checklist:</label>
      <select id="ckl-dept-sel" class="input" onchange="loadDeptChecklist()">
        <option>Phục vụ</option><option>Pha chế</option><option>Bán hàng</option>
        <option>Tư vấn viên</option><option>Gardener</option><option>Bảo vệ</option>
      </select>
    </div>
    <div id="ckl-editor" class="space-y-3">
      <p class="text-gray-400 text-center py-8 hd">Đang tải checklist...</p>
    </div>
    <button id="ckl-save-btn" class="btn btn-g w-full justify-center mt-4" onclick="saveDeptChecklist()">💾 Lưu Checklist</button>
  </div>

  <!-- ─── TAB: KPI ─── -->
  <div id="panel-kpi" class="hidden flex-1 p-4 overflow-y-auto">
    <div class="flex gap-2 mb-4">
      <input id="week-pick" type="week" class="input flex-1">
      <button class="btn btn-g" onclick="loadKPI()">🔍 Xem</button>
    </div>
    <div id="kpi-list" class="space-y-3">
      <p class="text-gray-400 text-center py-10 hd">Chọn tuần để xem KPI 📈</p>
    </div>
  </div>
</div>

<!-- ═══ MODAL: EMPLOYEE DETAIL / SCORE ═══ -->
<div id="modal-emp" class="modal hidden">
  <div class="modal-box">
    <div class="flex justify-between items-center mb-4">
      <h3 id="me-name" class="hd text-lg font-bold" style="color:#1B4332;"></h3>
      <button onclick="closeModal('modal-emp')" class="text-gray-400 text-2xl leading-none">&times;</button>
    </div>
    <div id="me-info" class="space-y-3 mb-4"></div>
    <div class="border-t pt-4">
      <h4 class="hd font-semibold text-gray-700 mb-3">📋 Kết quả đánh giá</h4>
      <div class="mb-3">
        <label class="text-sm text-gray-500 block mb-1">Ghi chú</label>
        <textarea id="s-note" class="input" rows="2" placeholder="Nhận xét của quản lý..."></textarea>
      </div>
      <div class="grid grid-cols-2 gap-3 mb-3">
        <button id="s-dat" onclick="setResult('Đạt')"
          class="py-3 rounded-xl font-bold hd text-sm border-2 transition-all"
          style="border-color:#16a34a;color:#16a34a">✅ Đạt</button>
        <button id="s-khong-dat" onclick="setResult('Không Đạt')"
          class="py-3 rounded-xl font-bold hd text-sm border-2 transition-all"
          style="border-color:#dc2626;color:#dc2626">❌ Không Đạt</button>
      </div>
      <button id="s-save" class="btn btn-g w-full justify-center" onclick="submitScore()">💾 Lưu đánh giá</button>
    </div>
  </div>
</div>

<!-- ═══ MODAL: CREATE EMPLOYEE ═══ -->
<div id="modal-create" class="modal hidden">
  <div class="modal-box">
    <div class="flex justify-between items-center mb-4">
      <h3 class="hd text-lg font-bold" style="color:#1B4332;">➕ Thêm nhân viên</h3>
      <button onclick="closeModal('modal-create')" class="text-gray-400 text-2xl">&times;</button>
    </div>
    <div class="space-y-3">
      <div>
        <label class="text-sm hd font-semibold text-gray-600 block mb-1">🔑 Mã nhân viên</label>
        <input id="ce-id" class="input" placeholder="VD: NV010" type="text">
      </div>
      <div>
        <label class="text-sm hd font-semibold text-gray-600 block mb-1">👤 Họ và tên</label>
        <input id="ce-name" class="input" placeholder="Nguyễn Văn A" type="text">
      </div>
      <div>
        <label class="text-sm hd font-semibold text-gray-600 block mb-1">🏷️ Bộ phận</label>
        <select id="ce-dept" class="input">
          <option>Phục vụ</option><option>Pha chế</option><option>Bán hàng</option>
          <option>Tư vấn viên</option><option>Gardener</option><option>Bảo vệ</option>
        </select>
      </div>
      <div>
        <label class="text-sm hd font-semibold text-gray-600 block mb-1">🪪 CCCD</label>
        <input id="ce-cccd" class="input" placeholder="Số căn cước công dân" type="text" inputmode="numeric" maxlength="12">
      </div>
      <div>
        <label class="text-sm hd font-semibold text-gray-600 block mb-1">📞 SĐT (tuỳ chọn)</label>
        <input id="ce-phone" class="input" placeholder="0901234567" type="tel">
      </div>
      <p id="ce-err" class="text-red-500 text-sm hidden"></p>
      <button id="ce-btn" class="btn btn-g w-full justify-center" onclick="doCreateEmp()">✅ Tạo nhân viên</button>
    </div>
  </div>
</div>

<!-- ═══ MODAL: EDIT EMPLOYEE ═══ -->
<div id="modal-edit" class="modal hidden">
  <div class="modal-box">
    <div class="flex justify-between items-center mb-4">
      <h3 class="hd text-lg font-bold" style="color:#1B4332;">✏️ Chỉnh sửa nhân viên</h3>
      <button onclick="closeModal('modal-edit')" class="text-gray-400 text-2xl">&times;</button>
    </div>
    <div class="space-y-3">
      <div>
        <label class="text-sm hd font-semibold text-gray-600 block mb-1">👤 Họ và tên</label>
        <input id="ee-name" class="input" type="text">
      </div>
      <div>
        <label class="text-sm hd font-semibold text-gray-600 block mb-1">🏷️ Bộ phận</label>
        <select id="ee-dept" class="input">
          <option>Phục vụ</option><option>Pha chế</option><option>Bán hàng</option>
          <option>Tư vấn viên</option><option>Gardener</option><option>Bảo vệ</option>
        </select>
      </div>
      <div>
        <label class="text-sm hd font-semibold text-gray-600 block mb-1">🪪 CCCD</label>
        <input id="ee-cccd" class="input" type="text" inputmode="numeric" maxlength="12">
      </div>
      <div>
        <label class="text-sm hd font-semibold text-gray-600 block mb-1">📞 SĐT</label>
        <input id="ee-phone" class="input" type="tel">
      </div>
      <div class="flex items-center gap-3">
        <input id="ee-active" type="checkbox" class="w-5 h-5 rounded" style="accent-color:#1B4332;">
        <label class="hd font-semibold text-gray-700 text-sm">Tài khoản đang hoạt động</label>
      </div>
      <button id="ee-btn" class="btn btn-g w-full justify-center" onclick="doUpdateEmp()">💾 Lưu thay đổi</button>
    </div>
  </div>
</div>

<script>
const API_URL    = 'https://script.google.com/macros/s/AKfycbw--o8gI15AXQjeGzaP-Hcz9Mhvu1fE8d9aAZawsK2vgEgZcswzuVa62yVfZYidKQAS/exec';
const API_SECRET = 'NCTTX_secret_2024';
const DEPTS      = ['Phục vụ','Pha chế','Bán hàng','Tư vấn viên','Gardener','Bảo vệ'];
const DEPT_ICON  = { 'Phục vụ':'🍽️','Pha chế':'☕','Bán hàng':'🛍️','Tư vấn viên':'💬','Gardener':'🌱','Bảo vệ':'🛡️' };

let mgrToken = '';
let reportData = [];
let currentFilter = 'all';
let currentEmp = null;
let mgrResult = '';
let mgrChecklist = [];
let editingId = '';
let deptChecklist = [];

// ── Login ──
async function doMgrLogin() {
  const pin = document.getElementById('pin').value;
  document.getElementById('pin-err').classList.add('hidden');
  try {
    const res = await api('managerLogin', { pin });
    if (res.success) {
      mgrToken = res.data.token;
      document.getElementById('v-login').classList.remove('show');
      document.getElementById('v-login').style.display = 'none';
      document.getElementById('v-main').classList.add('show');
      setToday();
      switchTab('report');
    } else {
      document.getElementById('pin-err').classList.remove('hidden');
    }
  } catch(e) { document.getElementById('pin-err').classList.remove('hidden'); }
}

function doMgrLogout() {
  mgrToken = '';
  document.getElementById('pin').value = '';
  document.getElementById('v-main').classList.remove('show');
  document.getElementById('v-main').style.display = 'none';
  document.getElementById('v-login').classList.add('show');
  document.getElementById('v-login').style.display = '';
}

function setToday() {
  const d = new Date();
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
  document.getElementById('date-pick').value = y+'-'+m+'-'+dd;
  const w = getISOWeek(d);
  document.getElementById('week-pick').value = y + '-W' + String(w).padStart(2,'0');
}

function getISOWeek(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day  = date.getUTCDay() || 7;
  date.setUTCDate(date.getUTCDate() + 4 - day);
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
}

// ── Tabs ──
function switchTab(t) {
  ['report','employees','checklist','kpi'].forEach(id => {
    document.getElementById('tab-'+id).classList.toggle('active', id===t);
    if (id!==t) document.getElementById('tab-'+id).classList.add('text-gray-400');
    else document.getElementById('tab-'+id).classList.remove('text-gray-400');
    document.getElementById('panel-'+id).classList.toggle('hidden', id!==t);
  });
  if (t==='employees') loadEmployees();
  if (t==='checklist') loadDeptChecklist();
}

// ── REPORT ──
function applyFilter(btn) {
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.style.background = '#f3f4f6'; b.style.color = '#6b7280';
  });
  btn.style.background = '#1B4332'; btn.style.color = '#fff';
  currentFilter = btn.dataset.s;
  renderReport();
}

async function loadReport() {
  const date = document.getElementById('date-pick').value;
  if (!date) return;
  const list = document.getElementById('report-list');
  list.innerHTML = '<p class="text-gray-400 text-center py-8 hd">⏳ Đang tải...</p>';
  try {
    const url = new URL(API_URL);
    url.searchParams.set('action','getDailyReport');
    url.searchParams.set('secret', API_SECRET);
    url.searchParams.set('date', date);
    url.searchParams.set('token', mgrToken);
    const res = await (await fetch(url)).json();
    if (res.success) { reportData = res.data || []; renderReport(); }
    else list.innerHTML = '<p class="text-red-400 text-center py-8">Lỗi tải dữ liệu</p>';
  } catch(e) { list.innerHTML = '<p class="text-red-400 text-center py-8">Lỗi kết nối</p>'; }
}

function renderReport() {
  const list = document.getElementById('report-list');
  const filtered = currentFilter === 'all' ? reportData : reportData.filter(e => e.status === currentFilter);
  if (!filtered.length) { list.innerHTML = '<p class="text-gray-400 text-center py-8 hd">Không có dữ liệu 📭</p>'; return; }

  list.innerHTML = filtered.map(emp => {
    const badgeCls = emp.status === 'Đang làm việc' ? 'badge-wip' : emp.status === 'Chờ duyệt' ? 'badge-wait' : emp.status === 'Đã duyệt' ? 'badge-ok' : 'badge-none';
    const pct = emp.checklistPct || 0;
    const ringColor = pct >= 80 ? '#38A169' : pct >= 50 ? '#DD6B20' : '#9ca3af';
    const empStr = JSON.stringify(emp).replace(/"/g, '&quot;');
    return `<div class="card p-4 cursor-pointer" onclick="openEmpModal('${empStr.replace(/'/g,"\\'")}')">
      <div class="flex items-start gap-3">
        <div class="score-ring" style="background:${pct>0?ringColor+'1a':'#f3f4f6'}; border: 2px solid ${pct>0?ringColor:'#e5e7eb'}; color:${pct>0?ringColor:'#9ca3af'}">
          ${pct}%
        </div>
        <div class="flex-1">
          <div class="flex justify-between items-start">
            <div>
              <span class="hd font-bold text-slate text-sm">${emp.name}</span>
              <span class="ml-2 text-xs" style="color:#2D6A4F;">${DEPT_ICON[emp.department]||'🏷️'} ${emp.department||''}</span>
            </div>
            <span class="badge ${badgeCls}">${emp.status||'Chưa vào'}</span>
          </div>
          <div class="flex gap-3 mt-1 text-xs text-gray-400">
            ${emp.checkInTime?'🕐 Vào: '+emp.checkInTime:''}
            ${emp.checkOutTime?'🏁 Ra: '+emp.checkOutTime:''}
            ${emp.score?'⭐ Điểm: '+emp.score:''}
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function openEmpModal(empStr) {
  try { currentEmp = JSON.parse(empStr.replace(/&quot;/g,'"')); } catch(e) { return; }
  mgrResult = '';
  mgrChecklist = buildFlatChecklist(currentEmp.checklistData);
  document.getElementById('me-name').textContent = currentEmp.name;

  document.getElementById('me-info').innerHTML = `
    <div class="grid grid-cols-2 gap-2 text-sm mb-2">
      <div class="bg-gray-50 rounded-xl p-3">
        <div class="text-xs text-gray-400 hd mb-1">🏷️ Bộ phận</div>
        <div class="hd font-semibold text-slate">${currentEmp.department||'-'}</div>
      </div>
      <div class="bg-gray-50 rounded-xl p-3">
        <div class="text-xs text-gray-400 hd mb-1">🕐 Giờ vào</div>
        <div class="hd font-semibold text-slate">${currentEmp.checkInTime||'-'}</div>
      </div>
    </div>
    <div id="mgr-ckl-wrap"></div>
    ${currentEmp.notes?`<div class="p-3 rounded-xl text-sm" style="background:#f0fdf4;border:1.5px solid #86efac;"><span class="text-xs font-bold text-green-700 block mb-1">📝 Tự đánh giá</span>${currentEmp.notes}</div>`:''}
    ${currentEmp.photoLinks&&currentEmp.photoLinks.length?`<div class="p-3 rounded-xl" style="background:#f0fdf4;border:1.5px solid #86efac;"><span class="text-xs font-bold text-green-700 block mb-2">📷 Ảnh</span><div class="flex gap-2 flex-wrap">${currentEmp.photoLinks.map((u,i)=>`<a href="${u}" target="_blank" class="text-blue-600 text-xs underline">Ảnh ${i+1}</a>`).join('')}</div></div>`:''}
  `;
  renderMgrChecklist();
  setResult('');
  document.getElementById('s-note').value = currentEmp.managerNotes || '';
  document.getElementById('modal-emp').classList.remove('hidden');
}

// Chuẩn hoá checklist về flat array [{phase, task, done}]
function buildFlatChecklist(data) {
  if (!data || !Array.isArray(data) || !data.length) return [];
  if ('task' in data[0]) return data.map(t => ({ phase: t.phase||0, task: t.task||t.text||'', done: !!t.done }));
  const out = [];
  data.forEach(phase => {
    (phase.tasks||[]).forEach(t => {
      out.push({ phase: phase.phase||0, task: typeof t==='object'?(t.text||t.task||''):t, done: typeof t==='object'?!!t.done:false });
    });
  });
  return out;
}

function recalcMgrPct() {
  if (!mgrChecklist.length) return 0;
  return Math.round(mgrChecklist.filter(t => t.done).length / mgrChecklist.length * 100);
}

function toggleMgrTask(idx) {
  mgrChecklist[idx].done = !mgrChecklist[idx].done;
  renderMgrChecklist();
}

function renderMgrChecklist() {
  const wrap = document.getElementById('mgr-ckl-wrap');
  if (!wrap) return;
  if (!mgrChecklist.length) { wrap.innerHTML = ''; return; }

  const phaseTitles = ['Đầu ca', 'Giữa ca', 'Cuối ca'];
  const pct = recalcMgrPct();
  const pctColor = pct>=80?'#16a34a':pct>=50?'#d97706':'#dc2626';

  const grouped = {};
  mgrChecklist.forEach((t, i) => {
    if (!grouped[t.phase]) grouped[t.phase] = [];
    grouped[t.phase].push({ ...t, idx: i });
  });

  const phasesHtml = Object.keys(grouped).sort().map(p => {
    const items = grouped[p];
    const doneCnt = items.filter(t => t.done).length;
    const tasksHtml = items.map(t =>
      `<div class="flex items-center gap-2 py-1.5 cursor-pointer select-none" onclick="toggleMgrTask(${t.idx})">
        <span class="text-lg leading-none">${t.done ? '✅' : '⬜'}</span>
        <span class="text-sm ${t.done?'text-gray-700':'text-gray-400 line-through'}">${t.task}</span>
      </div>`
    ).join('');
    return `<div class="mb-3">
      <div class="text-xs font-bold hd mb-1" style="color:#2D6A4F">
        ${phaseTitles[p]||'Phase '+p} <span class="font-normal text-gray-400">(${doneCnt}/${items.length})</span>
      </div>
      ${tasksHtml}
    </div>`;
  }).join('');

  wrap.innerHTML = `<div class="p-3 rounded-xl text-sm mb-2" style="background:#f8fffe;border:1.5px solid #52B788">
    <div class="flex justify-between items-center mb-2">
      <span class="text-xs font-bold hd" style="color:#1B4332">📋 Checklist (click để điều chỉnh)</span>
      <span id="mgr-pct" class="text-base font-bold hd" style="color:${pctColor}">${pct}%</span>
    </div>
    ${phasesHtml}
  </div>`;
}

function setResult(val) {
  mgrResult = val;
  const dat    = document.getElementById('s-dat');
  const khongDat = document.getElementById('s-khong-dat');
  dat.style.background    = val==='Đạt'    ? '#16a34a' : 'transparent';
  dat.style.color         = val==='Đạt'    ? '#fff'    : '#16a34a';
  khongDat.style.background = val==='Không Đạt' ? '#dc2626' : 'transparent';
  khongDat.style.color      = val==='Không Đạt' ? '#fff'    : '#dc2626';
}

async function submitScore() {
  if (!mgrResult) { alert('⚠️ Vui lòng chọn Đạt hoặc Không Đạt!'); return; }
  const btn = document.getElementById('s-save');
  btn.textContent = '⏳ Đang lưu...'; btn.disabled = true;
  try {
    const date = document.getElementById('date-pick').value;
    const res = await api('scoreEmployee', {
      token: mgrToken, employeeName: currentEmp.name, date,
      managerResult: mgrResult,
      managerChecklist: mgrChecklist,
      managerNotes: document.getElementById('s-note').value,
    });
    if (res.success) {
      const pct = recalcMgrPct();
      const idx = reportData.findIndex(e => e.name === currentEmp.name);
      if (idx >= 0) { reportData[idx].checklistPct = pct; reportData[idx].status = mgrResult; }
      closeModal('modal-emp');
      renderReport();
    } else { alert('Lỗi: ' + (res.message||'')); }
  } catch(e) { alert('Lỗi kết nối'); }
  finally { btn.textContent = '💾 Lưu đánh giá'; btn.disabled = false; }
}

// ── EMPLOYEES ──
async function loadEmployees() {
  const list = document.getElementById('emp-list');
  list.innerHTML = '<p class="text-gray-400 text-center py-8 hd">⏳ Đang tải...</p>';
  try {
    const res = await api('listEmployees', { token: mgrToken });
    if (res.success) renderEmployees(res.data||[]);
    else list.innerHTML = '<p class="text-red-400 text-center py-8">Lỗi tải dữ liệu</p>';
  } catch(e) { list.innerHTML = '<p class="text-red-400 text-center py-8">Lỗi kết nối</p>'; }
}

function renderEmployees(emps) {
  const list = document.getElementById('emp-list');
  if (!emps.length) { list.innerHTML = '<p class="text-gray-400 text-center py-8 hd">Chưa có nhân viên 👥</p>'; return; }

  // Group by dept
  const groups = {};
  emps.forEach(e => { if (!groups[e.department]) groups[e.department] = []; groups[e.department].push(e); });

  list.innerHTML = Object.entries(groups).map(([dept, members]) => `
    <details class="card overflow-hidden" open>
      <summary class="p-4 flex items-center justify-between" style="background:#f0fdf4;">
        <span class="hd font-bold text-sm" style="color:#1B4332;">${DEPT_ICON[dept]||'🏷️'} ${dept} <span class="font-normal text-gray-400">(${members.length})</span></span>
        <span class="text-gray-400 text-xs">▼</span>
      </summary>
      <div class="divide-y divide-gray-50">
        ${members.map(emp => `
          <div class="flex items-center justify-between px-4 py-3 ${emp.active===false?'opacity-50':''}">
            <div>
              <div class="hd font-semibold text-sm text-slate">${emp.name}</div>
              <div class="text-xs text-gray-400 mt-0.5">🔑 ${emp.id} ${emp.phone?'· 📞 '+emp.phone:''}</div>
            </div>
            <div class="flex items-center gap-2">
              ${emp.active===false?'<span class="badge" style="background:#fee2e2;color:#b91c1c;">Tạm dừng</span>':'<span class="badge badge-wip">Active</span>'}
              <button class="btn btn-o py-1 px-3 text-xs" onclick="openEditEmp(${JSON.stringify(emp).replace(/"/g,'&quot;')})">✏️</button>
            </div>
          </div>
        `).join('')}
      </div>
    </details>
  `).join('');
}

function openCreateEmp() {
  document.getElementById('ce-id').value = '';
  document.getElementById('ce-name').value = '';
  document.getElementById('ce-phone').value = '';
  document.getElementById('ce-err').classList.add('hidden');
  document.getElementById('modal-create').classList.remove('hidden');
}

async function doCreateEmp() {
  const id   = document.getElementById('ce-id').value.trim();
  const name = document.getElementById('ce-name').value.trim();
  const dept = document.getElementById('ce-dept').value;
  const cccd = document.getElementById('ce-cccd').value.trim();
  const phone= document.getElementById('ce-phone').value.trim();
  const err  = document.getElementById('ce-err');
  err.classList.add('hidden');
  if (!id||!name) { err.textContent = '⚠️ Thiếu mã hoặc tên'; err.classList.remove('hidden'); return; }
  if (!cccd) { err.textContent = '⚠️ Vui lòng nhập CCCD'; err.classList.remove('hidden'); return; }
  const btn = document.getElementById('ce-btn');
  btn.textContent = '⏳...'; btn.disabled = true;
  try {
    const res = await api('createEmployee', { token: mgrToken, id, name, department: dept, phone, cccd });
    if (res.success) { closeModal('modal-create'); loadEmployees(); }
    else { err.textContent = res.message||'Lỗi tạo nhân viên'; err.classList.remove('hidden'); }
  } catch(e) { err.textContent = 'Lỗi kết nối'; err.classList.remove('hidden'); }
  finally { btn.textContent = '✅ Tạo nhân viên'; btn.disabled = false; }
}

function openEditEmp(emp) {
  editingId = emp.id;
  document.getElementById('ee-name').value  = emp.name;
  document.getElementById('ee-dept').value  = emp.department;
  document.getElementById('ee-cccd').value  = emp.cccd||'';
  document.getElementById('ee-phone').value = emp.phone||'';
  document.getElementById('ee-active').checked = emp.active !== false;
  document.getElementById('modal-edit').classList.remove('hidden');
}

async function doUpdateEmp() {
  const btn = document.getElementById('ee-btn');
  btn.textContent = '⏳...'; btn.disabled = true;
  try {
    const res = await api('updateEmployee', {
      token:      mgrToken,
      id:         editingId,
      name:       document.getElementById('ee-name').value.trim(),
      department: document.getElementById('ee-dept').value,
      cccd:       document.getElementById('ee-cccd').value.trim(),
      phone:      document.getElementById('ee-phone').value.trim(),
      active:     document.getElementById('ee-active').checked,
    });
    if (res.success) { closeModal('modal-edit'); loadEmployees(); }
    else alert('Lỗi: ' + (res.message||''));
  } catch(e) { alert('Lỗi kết nối'); }
  finally { btn.textContent = '💾 Lưu thay đổi'; btn.disabled = false; }
}

// ── CHECKLIST EDITOR ──
async function loadDeptChecklist() {
  const dept = document.getElementById('ckl-dept-sel').value;
  const editor = document.getElementById('ckl-editor');
  editor.innerHTML = '<p class="text-gray-400 text-center py-8 hd">⏳ Đang tải...</p>';
  try {
    const url = new URL(API_URL);
    url.searchParams.set('action','getDeptChecklist');
    url.searchParams.set('secret',API_SECRET);
    url.searchParams.set('department',dept);
    const res = await (await fetch(url)).json();
    if (res.success) { deptChecklist = res.data; renderCklEditor(); }
    else editor.innerHTML = '<p class="text-red-400 text-center py-8">Lỗi tải checklist</p>';
  } catch(e) { editor.innerHTML = '<p class="text-red-400 text-center py-8">Lỗi kết nối</p>'; }
}

function renderCklEditor() {
  const phaseTitles = ['🌅 Đầu ca','☀️ Giữa ca','🌙 Cuối ca'];
  document.getElementById('ckl-editor').innerHTML = deptChecklist.map((phase, pi) => `
    <div class="card p-4">
      <div class="flex items-center justify-between mb-3">
        <h4 class="hd font-bold text-sm" style="color:#1B4332;">${phaseTitles[pi]||phase.title}</h4>
        <button class="btn btn-o py-1 px-3 text-xs" onclick="addTask(${pi})">➕ Thêm</button>
      </div>
      <div id="tasks-${pi}" class="space-y-2">
        ${phase.tasks.map((t,ti) => `
          <div class="flex items-center gap-2" id="taskrow-${pi}-${ti}">
            <input type="text" value="${t.replace(/"/g,'&quot;')}" class="input text-sm flex-1" id="task-${pi}-${ti}">
            <button class="text-red-400 hover:text-red-600 text-xl leading-none" onclick="removeTask(${pi},${ti})">×</button>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function addTask(pi) {
  deptChecklist[pi].tasks.push('');
  renderCklEditor();
  // Focus new input
  const inputs = document.querySelectorAll(`#tasks-${pi} input`);
  if (inputs.length) inputs[inputs.length-1].focus();
}

function removeTask(pi, ti) {
  deptChecklist[pi].tasks.splice(ti,1);
  renderCklEditor();
}

async function saveDeptChecklist() {
  const dept = document.getElementById('ckl-dept-sel').value;
  // Collect current values from inputs
  deptChecklist.forEach((phase, pi) => {
    phase.tasks = phase.tasks.map((_, ti) => {
      const el = document.getElementById('task-'+pi+'-'+ti);
      return el ? el.value.trim() : '';
    }).filter(t => t);
  });

  const btn = document.getElementById('ckl-save-btn');
  btn.textContent = '⏳ Đang lưu...'; btn.disabled = true;
  try {
    const res = await api('updateDeptChecklist', { token: mgrToken, department: dept, checklist: deptChecklist });
    if (res.success) { alert('✅ Đã lưu checklist cho bộ phận ' + dept); renderCklEditor(); }
    else alert('Lỗi: ' + (res.message||''));
  } catch(e) { alert('Lỗi kết nối'); }
  finally { btn.textContent = '💾 Lưu Checklist'; btn.disabled = false; }
}

// ── KPI ──
async function loadKPI() {
  const week = document.getElementById('week-pick').value;
  if (!week) return;
  const list = document.getElementById('kpi-list');
  list.innerHTML = '<p class="text-gray-400 text-center py-8 hd">⏳ Đang tải...</p>';
  try {
    const url = new URL(API_URL);
    url.searchParams.set('action','getWeeklyKPI');
    url.searchParams.set('secret',API_SECRET);
    url.searchParams.set('week',week);
    url.searchParams.set('token',mgrToken);
    const res = await (await fetch(url)).json();
    if (res.success) renderKPI(res.data||[]);
    else list.innerHTML = '<p class="text-red-400 text-center py-8">Lỗi tải KPI</p>';
  } catch(e) { list.innerHTML = '<p class="text-red-400 text-center py-8">Lỗi kết nối</p>'; }
}

function renderKPI(data) {
  const list = document.getElementById('kpi-list');
  if (!data.length) { list.innerHTML = '<p class="text-gray-400 text-center py-8 hd">Không có dữ liệu tuần này 📊</p>'; return; }

  list.innerHTML = data.map((emp, idx) => {
    const medal = idx===0?'🥇':idx===1?'🥈':idx===2?'🥉':'';
    const avg   = emp.avgScore ? emp.avgScore.toFixed(1) : '-';
    const clr   = emp.avgScore>=4?'#38A169':emp.avgScore>=2.5?'#DD6B20':'#E53E3E';
    return `<div class="card p-4">
      <div class="flex items-start justify-between">
        <div class="flex items-center gap-3">
          <div class="text-2xl">${medal||'#'+(idx+1)}</div>
          <div>
            <div class="hd font-bold text-slate text-sm">${emp.name}</div>
            <div class="text-xs mt-0.5" style="color:#2D6A4F;">${DEPT_ICON[emp.department]||'🏷️'} ${emp.department||''}</div>
          </div>
        </div>
        <div class="text-right">
          <div class="hd font-bold text-2xl" style="color:${clr}">${avg}</div>
          <div class="text-xs text-gray-400">TB điểm</div>
        </div>
      </div>
      <div class="grid grid-cols-3 gap-2 mt-3 text-center">
        <div class="bg-gray-50 rounded-xl p-2">
          <div class="hd font-bold text-slate text-sm">${emp.workDays||0}</div>
          <div class="text-xs text-gray-400">Ngày làm</div>
        </div>
        <div class="bg-gray-50 rounded-xl p-2">
          <div class="hd font-bold text-slate text-sm">${emp.totalHours||0}h</div>
          <div class="text-xs text-gray-400">Tổng giờ</div>
        </div>
        <div class="bg-gray-50 rounded-xl p-2">
          <div class="hd font-bold text-slate text-sm">${emp.avgChecklist||0}%</div>
          <div class="text-xs text-gray-400">TB checklist</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── Helpers ──
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

async function api(action, body) {
  const res = await fetch(API_URL, { method:'POST', body: JSON.stringify({ action, secret: API_SECRET, ...body }) });
  return res.json();
}

document.getElementById('pin').addEventListener('keydown', e => { if (e.key==='Enter') doMgrLogin(); });
</script>
